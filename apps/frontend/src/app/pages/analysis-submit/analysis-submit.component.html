<div class="min-h-[80vh]">
  <!-- Content -->
  <div class="max-w-4xl mx-auto px-4 py-12">
    <div class="bg-white rounded-3xl shadow-2xl p-12 border border-gray-100">
      <div class="text-center mb-16">
        <h2 class="text-4xl font-black bg-gradient-to-r from-gray-800 to-slate-700 bg-clip-text text-transparent mb-4">Security Analysis</h2>
        <div class="w-32 h-32 mx-auto bg-gradient-to-r from-blue-500 to-emerald-500 rounded-full flex items-center justify-center shadow-2xl">
          <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
        </div>
      </div>
      <h2 class="text-2xl font-bold text-gray-800 mb-6">Security Analysis</h2>

      <!-- Tab Navigation -->
      <div class="flex space-x-4 mb-6 border-b">
        <button
          (click)="analysisType = 'text'"
          [class.border-b-2]="analysisType === 'text'"
          [class.border-blue-600]="analysisType === 'text'"
          class="px-4 py-2 font-semibold text-gray-600 hover:text-blue-600"
        >
          Analyze Text
        </button>
        <button
          (click)="analysisType = 'url'"
          [class.border-b-2]="analysisType === 'url'"
          [class.border-blue-600]="analysisType === 'url'"
          class="px-4 py-2 font-semibold text-gray-600 hover:text-blue-600"
        >
          Analyze URL
        </button>
        <button
          (click)="analysisType = 'screenshot'"
          [class.border-b-2]="analysisType === 'screenshot'"
          [class.border-blue-600]="analysisType === 'screenshot'"
          class="px-4 py-2 font-semibold text-gray-600 hover:text-blue-600"
        >
          Analyze Screenshot
        </button>
      </div>

      <!-- Analyze Text Form -->
      <form *ngIf="analysisType === 'text'" [formGroup]="textForm" (ngSubmit)="submitText()">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Text Content</label>
          <textarea
            formControlName="text"
            rows="6"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Enter text to analyze for security threats..."
          ></textarea>
          <div *ngIf="textForm.get('text')?.invalid && textForm.get('text')?.touched" class="text-red-500 text-sm mt-1">
            <p *ngIf="textForm.get('text')?.errors?.['required']">Text is required</p>
            <p *ngIf="textForm.get('text')?.errors?.['minlength']">Text must be at least 10 characters</p>
            <p *ngIf="textForm.get('text')?.errors?.['maxlength']">Text must not exceed 10000 characters</p>
          </div>
        </div>
        <button
          type="submit"
          [disabled]="textForm.invalid || isLoading"
          class="mt-6 w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-bold py-2 px-4 rounded-lg transition"
        >
          {{ isLoading ? 'Analyzing...' : 'Analyze Text' }}
        </button>
      </form>

      <!-- Analyze URL Form -->
      <form *ngIf="analysisType === 'url'" [formGroup]="urlForm" (ngSubmit)="submitUrl()">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">URL</label>
          <input
            type="url"
            formControlName="url"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="https://example.com"
          />
          <div *ngIf="urlForm.get('url')?.invalid && urlForm.get('url')?.touched" class="text-red-500 text-sm mt-1">
            <p *ngIf="urlForm.get('url')?.errors?.['required']">URL is required</p>
            <p *ngIf="urlForm.get('url')?.errors?.['pattern']">Invalid URL format</p>
          </div>
        </div>
        <button
          type="submit"
          [disabled]="urlForm.invalid || isLoading"
          class="mt-6 w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-bold py-2 px-4 rounded-lg transition"
        >
          {{ isLoading ? 'Analyzing...' : 'Analyze URL' }}
        </button>
      </form>

      <!-- Analyze Screenshot Form -->
      <form *ngIf="analysisType === 'screenshot'" [formGroup]="screenshotForm" (ngSubmit)="submitScreenshot()">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Screenshot Filename</label>
          <input
            type="text"
            formControlName="filename"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="screenshot.png"
          />
          <div *ngIf="screenshotForm.get('filename')?.invalid && screenshotForm.get('filename')?.touched" class="text-red-500 text-sm mt-1">
            <p *ngIf="screenshotForm.get('filename')?.errors?.['required']">Filename is required</p>
          </div>
        </div>
        <button
          type="submit"
          [disabled]="screenshotForm.invalid || isLoading"
          class="mt-6 w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-bold py-2 px-4 rounded-lg transition"
        >
          {{ isLoading ? 'Analyzing...' : 'Analyze Screenshot' }}
        </button>
      </form>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded">
        {{ errorMessage }}
      </div>
    </div>
  </div>
</div>
