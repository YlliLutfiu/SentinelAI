<div class="min-h-[80vh]">
  <div class="flex items-center justify-center p-8">
    <div class="bg-white rounded-3xl shadow-2xl p-12 w-full max-w-md border border-gray-100">
      <div class="text-center mb-12">
        <h1 class="text-4xl font-black bg-gradient-to-r from-green-600 to-emerald-600 bg-clip-text text-transparent mb-4">SentinelAI</h1>
        <h2 class="text-2xl font-bold text-gray-700">Create Account</h2>
      </div>
    <h2 class="text-xl font-semibold text-center text-gray-600 mb-8">Create Account</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
          placeholder="user@example.com"
        />
        <div *ngIf="email.invalid && email.touched" class="text-red-500 text-sm mt-1">
          <p *ngIf="email.errors?.['required']">Email is required</p>
          <p *ngIf="email.errors?.['email']">Invalid email format</p>
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input
          type="password"
          formControlName="password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
          placeholder="At least 8 characters"
        />
        <div *ngIf="password.invalid && password.touched" class="text-red-500 text-sm mt-1">
          <p *ngIf="password.errors?.['required']">Password is required</p>
          <p *ngIf="password.errors?.['minlength']">Password must be at least 8 characters</p>
        </div>
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input
          type="password"
          formControlName="confirmPassword"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
          placeholder="Confirm your password"
        />
        <div *ngIf="confirmPassword.invalid && confirmPassword.touched" class="text-red-500 text-sm mt-1">
          <p *ngIf="confirmPassword.errors?.['required']">Confirmation is required</p>
          <p *ngIf="form.errors?.['passwordMismatch']">Passwords don't match</p>
        </div>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="p-3 bg-red-100 border border-red-400 text-red-700 rounded">
        {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="form.invalid || isLoading"
        class="w-full bg-green-600 hover:bg-green-700 disabled:bg-gray-400 text-white font-bold py-2 px-4 rounded-lg transition"
      >
        {{ isLoading ? 'Creating account...' : 'Register' }}
      </button>
    </form>

    <!-- Login Link -->
    <div class="mt-6 text-center text-gray-600">
      Already have an account?
      <a routerLink="/login" class="text-green-600 font-semibold hover:underline">Login here</a>
    </div>
  </div>
</div>
