<div class="min-h-[80vh]">
  <!-- Content -->
  <div class="max-w-4xl mx-auto px-4 py-12">
    <div class="bg-white rounded-3xl shadow-2xl p-12 border border-gray-100">
      <div class="text-center mb-16">
        <h2 class="text-4xl font-black bg-gradient-to-r from-gray-800 to-slate-700 bg-clip-text text-transparent mb-4">User Profile</h2>
        <div class="w-32 h-32 mx-auto bg-gradient-to-r from-blue-500 to-indigo-600 rounded-full flex items-center justify-center shadow-2xl">
          <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
          </svg>
        </div>
      </div>
      <h2 class="text-2xl font-bold text-gray-800 mb-6">Profile</h2>

      <!-- User Info -->
      <div *ngIf="currentUser()" class="mb-8 p-4 bg-blue-50 rounded-lg">
        <p><strong>Email:</strong> {{ currentUser()?.email }}</p>
        <p><strong>Role:</strong> {{ currentUser()?.role }}</p>
        <p><strong>Member Since:</strong> {{ currentUser()?.createdAt | date: 'MMM dd, yyyy' }}</p>
      </div>

      <!-- Update Profile Form -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email (optional)</label>
          <input
            type="email"
            formControlName="email"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Leave blank to keep current"
          />
          <div *ngIf="email.invalid && email.touched" class="text-red-500 text-sm mt-1">
            <p *ngIf="email.errors?.['email']">Invalid email format</p>
          </div>
        </div>

        <!-- New Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">New Password (optional)</label>
          <input
            type="password"
            formControlName="password"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Leave blank to keep current"
          />
          <div *ngIf="password.invalid && password.touched" class="text-red-500 text-sm mt-1">
            <p *ngIf="password.errors?.['minlength']">Password must be at least 8 characters</p>
          </div>
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="p-3 bg-red-100 border border-red-400 text-red-700 rounded">
          {{ errorMessage }}
        </div>

        <!-- Success Message -->
        <div *ngIf="successMessage" class="p-3 bg-green-100 border border-green-400 text-green-700 rounded">
          {{ successMessage }}
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="form.invalid || isLoading || !hasChanges()"
          class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-bold py-2 px-4 rounded-lg transition"
        >
          {{ isLoading ? 'Updating...' : 'Update Profile' }}
        </button>
      </form>
    </div>
  </div>
</div>
